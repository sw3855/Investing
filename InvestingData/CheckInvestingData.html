FUNDAMENTAL_CURRENT_MONEY_FIELDS = [
    "total_revenue_ttm", "gross_profit_ttm", "net_income_ttm",

def strip_tags(text):
    """검색 하이라이트용 <em> 등 HTML 태그 제거."""
    return re.sub(r"<[^>]+>", "", text or "")


def _proxied(url):
    """CORS 프록시 접두어가 설정돼 있으면 URL 을 감싼다. (KOSIS HTML 과 동일)"""
    prefix = document.querySelector("#proxy").value.strip()
    if not prefix:
        return url
    if prefix.endswith("=") or prefix.endswith("?"):
        return prefix + str(js.encodeURIComponent(url))
    return prefix + url


async def _get_json(url, params):
    """pyfetch 로 GET 호출 후 JSON 을 반환. (requests 대체)"""
    full = url + "?" + urlencode(params)
    try:
        resp = await pyfetch(_proxied(full), method="GET")
    except Exception as exc:  # 네트워크/CORS 오류
        raise InvestingApiError(
            "네트워크 요청 실패(브라우저 CORS 제한일 수 있습니다). "
            "Cloudflare Worker CORS 프록시를 설정했는지 확인하세요.\n상세: %s" % exc
        )
    if resp.status >= 400:
        raise InvestingApiError("HTTP %s 응답" % resp.status)
    text = await resp.string()
    try:
        return json.loads(text)
    except ValueError:
        raise InvestingApiError("JSON 이 아닌 응답을 받았습니다: %s" % text[:200])


async def _get_text(url):
    """pyfetch 로 GET 호출 후 응답 본문(문자열)을 그대로 반환."""
    try:
        resp = await pyfetch(_proxied(url), method="GET")
    except Exception as exc:  # 네트워크/CORS 오류
        raise InvestingApiError(
            "네트워크 요청 실패(브라우저 CORS 제한일 수 있습니다). "
            "Cloudflare Worker CORS 프록시를 설정했는지 확인하세요.\n상세: %s" % exc
        )
    if resp.status >= 400:
        raise InvestingApiError("HTTP %s 응답" % resp.status)
    return await resp.string()


def _extract_array(text, key):
    """텍스트에서 "key":[ ... ] 형태의 JSON 배열을 괄호 균형으로 추출해 파싱."""
    p = text.find('"%s":' % key)
    if p == -1:
        return None
    start = text.find("[", p)
    if start == -1:
        return None
    depth = 0
    for i in range(start, len(text)):
        c = text[i]
        if c == "[":
            depth += 1
        elif c == "]":
            depth -= 1
            if depth == 0:
                try:
                    return json.loads(text[start:i + 1])
                except ValueError:
                    return None
    return None


async def search_symbol(ticker, lang="en"):
    """티커로 Investing 심볼 검색. (full_symbol, description) 반환, 실패 시 None."""
    params = {
        "text": ticker, "hl": 0, "lang": lang, "type": "", "domain": "production",
    }
    try:
        data = await _get_json(SYMBOL_SEARCH_URL, params)
    except InvestingApiError:
        return None

    if isinstance(data, dict):
        items = data.get("symbols", [])
    else:
        items = data
    if not items:
        return None

    ticker_upper = ticker.upper()

    def build(item):
        symbol = strip_tags(item.get("symbol", "")).upper()
        prefix = item.get("prefix") or item.get("exchange") or ""
        prefix = strip_tags(prefix).upper()
        if not symbol or not prefix:
            return None
        desc = strip_tags(item.get("description", ""))
        return "%s:%s" % (prefix, symbol), desc

    for item in items:
        built = build(item)
        if built and built[0].split(":", 1)[1] == ticker_upper:
            return built
    for item in items:
        built = build(item)
        if built:
            return built
    return None


async def fetch_forecast(full_symbol):
    """scanner API에서 전망 데이터를 가져옴. dict 반환, 실패 시 None."""

        "symbol": full_symbol, "fields": ",".join(FIELDS), "no_404": "true",
    }

    if not isinstance(data, dict) or data.get("s") == "error":

async def fetch_fx_rate(from_ccy, to_ccy):
    """from_ccy -> to_ccy 환율(1 from = ? to)을 조회. 실패 시 None."""
    if not from_ccy or not to_ccy:
        return None
    if from_ccy == to_ccy:
        return 1.0

    async def _close(sym):
        params = {"symbol": sym, "fields": "close", "no_404": "true"}
        try:
            d = await _get_json(SCANNER_SYMBOL_URL, params)
        except InvestingApiError:
            return None
        if isinstance(d, dict) and isinstance(d.get("close"), (int, float)):
            return d["close"]
        return None

    for prefix in ("FX_IDC", "FX"):
        rate = await _close("%s:%s%s" % (prefix, from_ccy, to_ccy))
        if rate:
            return rate
    # 직접 통화쌍이 없으면 역방향으로 조회 후 역수를 사용
    for prefix in ("FX_IDC", "FX"):
        inv = await _close("%s:%s%s" % (prefix, to_ccy, from_ccy))
        if inv:
            return 1.0 / inv
    return None


def _convert_fundamentals(data, financials, rate):
    """펀더멘털(보고 통화) 금액 필드를 거래소 통화로 환산(제자리 수정)."""
    if not rate or rate == 1.0:
        return
    for key in FUNDAMENTAL_MONEY_FIELDS:
        v = data.get(key)
        if isinstance(v, (int, float)):
            data[key] = v * rate
    if financials:
        for key in FUNDAMENTAL_HISTORY_MONEY_FIELDS:
            arr = financials.get(key)
            if isinstance(arr, list):
                financials[key] = [
                    x * rate if isinstance(x, (int, float)) else x for x in arr
                ]
        for key in FUNDAMENTAL_CURRENT_MONEY_FIELDS:
            v = financials.get(key)
            if isinstance(v, (int, float)):
                financials[key] = v * rate


async def resolve_symbol(ticker, exchange=None, lang="en"):
    """입력 티커를 'EXCHANGE:TICKER' 전체 심볼로 해석."""
    if ":" in ticker:
        return ticker.upper()
    if exchange:
        return "%s:%s" % (exchange.upper(), ticker.upper())
    found = await search_symbol(ticker, lang=lang)
    if found:
        return found[0]
    return None

    """심볼의 기본 정보(type/description/close 등)를 조회. dict 반환, 실패 시 None.

    type == 'fund' (typespecs 에 'etf') 이면 ETF, 'stock' 이면 개별종목.
    """
    params = {
        "symbol": full_symbol,
        "fields": "type,typespecs,description,close,currency",
        "no_404": "true",
    }
    try:
        data = await _get_json(SCANNER_SYMBOL_URL, params)
    except InvestingApiError:
        return None
    if not isinstance(data, dict) or data.get("s") == "error":
        return None
    if not any(v is not None for v in data.values()):
        return None
    return data


async def fetch_holdings(full_symbol):
    """ETF 보유종목(top_holdings) 리스트를 조회. (holdings, report_ts) 반환.

    Investing 의 ETF holdings 페이지는 보유종목을 페이지 본문에 JSON 으로
    렌더링한다. CORS 프록시(Worker)는 Accept: application/json 을 붙이므로
    응답이 { ... "render_results": {"react_content": "...top_holdings..."} }
    형태의 JSON 래퍼로 온다. 프록시 없이 직접 접근하면 HTML 로 온다.
    두 경우 모두 top_holdings 배열을 추출한다.
    """
    exchange, _, ticker = full_symbol.partition(":")
    url = "%s/symbols/%s-%s/holdings/" % (TV_BASE, exchange, ticker)
    try:
        text = await _get_text(url)
    except InvestingApiError:
        return None, None

    source = text
    try:
        doc = json.loads(text)
        react = (doc.get("render_results") or {}).get("react_content")
        if react:
            source = react
    except ValueError:
        pass  # 직접 접근 시 HTML 이므로 원문 그대로 사용

    holdings = _extract_array(source, "top_holdings")
    report_ts = None
    m = re.search(r'"holding_report_date":(\d+)', source)
    if m:
        report_ts = int(m.group(1))
    return holdings, report_ts


async def lookup(ticker, exchange=None, lang="en"):
    """티커를 해석하고 종류를 판별해 조회한다.

    반환: (kind, full_symbol, payload)
      kind == "stock" -> payload 는 전망(forecast) data(dict)
      kind == "etf"   -> payload 는 {"meta", "holdings", "report_ts"}
      kind == "notfound" / "nodata" -> 실패
    """
    full_symbol = await resolve_symbol(ticker, exchange, lang)
    if full_symbol is None:
        return "notfound", None, None

    meta = await fetch_symbol_meta(full_symbol)

    # 자동 탐색 실패 시 주요 거래소를 순회하며 재시도
    if meta is None and ":" not in ticker and not exchange:
        for ex in FALLBACK_EXCHANGES:
            candidate = "%s:%s" % (ex, ticker.upper())
            meta = await fetch_symbol_meta(candidate)
            if meta is not None:
                full_symbol = candidate
                break

    if meta is None:
        return "nodata", full_symbol, None

    typespecs = meta.get("typespecs") or []
    is_etf = meta.get("type") == "fund" or "etf" in typespecs

    if is_etf:
        holdings, report_ts = await fetch_holdings(full_symbol)
        payload = {"meta": meta, "holdings": holdings, "report_ts": report_ts}
        return "etf", full_symbol, payload

    data = await fetch_forecast(full_symbol)
    if data is None:
        return "nodata", full_symbol, None
    valuation = await fetch_valuation(full_symbol)
    financials = await fetch_financials(full_symbol)

    # 펀더멘털 지표(매출·EPS·목표주가 등)는 보고 통화로 제공되므로
    # 거래소 통화(주가 통화)와 다르면 환율로 환산해 통일한다.
    trade_ccy = data.get("currency")
    fund_ccy = data.get("fundamental_currency_code")
    fx = None
    if trade_ccy and fund_ccy and trade_ccy != fund_ccy:
        rate = await fetch_fx_rate(fund_ccy, trade_ccy)
        if rate:
            _convert_fundamentals(data, financials, rate)
            fx = {"from": fund_ccy, "to": trade_ccy, "rate": rate}

    payload = {
        "forecast": data, "valuation": valuation, "financials": financials,
        "fx": fx,
    }
    return "stock", full_symbol, payload


def rating_label(mark):
    """recommendation_mark(1=적극매수 ~ 5=적극매도)를 한글 라벨로 변환."""
    if mark is None:
        return "정보 없음", "hold"
    if mark <= 1.5:
        return "적극 매수 (Strong Buy)", "buy"
    if mark <= 2.5:
        return "매수 (Buy)", "buy"
    if mark <= 3.5:
        return "중립 (Neutral)", "hold"
    if mark <= 4.5:
        return "매도 (Sell)", "sell"
    return "적극 매도 (Strong Sell)", "sell"


def fmt_num(value, digits=2):
    if value is None:
        return "-"
    return "{:,.{d}f}".format(value, d=digits)


def fmt_large(value, currency=""):
    """큰 금액을 T/B/M 단위로 축약."""
    if value is None:
        return "-"
    sign = "-" if value < 0 else ""
    v = abs(value)
    suffix = (" " + currency).rstrip()
    if v >= 1e12:
        return "{}{:,.2f}T{}".format(sign, v / 1e12, suffix)
    if v >= 1e9:
        return "{}{:,.2f}B{}".format(sign, v / 1e9, suffix)
    if v >= 1e6:
        return "{}{:,.2f}M{}".format(sign, v / 1e6, suffix)
    return "{}{:,.2f}{}".format(sign, v, suffix)


def fmt_date(ts):
    if ts is None:
        return "-"
    try:
        return datetime.fromtimestamp(ts, tz=timezone.utc).strftime("%Y-%m-%d")
    except (OverflowError, OSError, ValueError):
        return "-"


# ===================== 화면 렌더링 =====================

def _esc(s):
    s = "" if s is None else str(s)
    return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")


def _kv(k, v, cls=""):
    return '<div class="kv"><span class="k">%s</span><span class="v %s">%s</span></div>' % (
        _esc(k), cls, _esc(v),
    )


def _upside(target, close):
    """(표시 문자열, css class) 반환."""
    if target is None or not close:
        return "", ""
    pct = (target - close) / close * 100
    cls = "up" if pct >= 0 else "down"
    return "%+.2f%%" % pct, cls

def _on_add_compare(event):
    sym = _LAST_STOCK.get("symbol")
    if not sym or _LAST_STOCK.get("data") is None:
        window.alert("먼저 종목을 조회하세요.")
        return
    for c in _COMPARE:
        if c["symbol"] == sym:
            window.alert("이미 비교 목록에 있는 종목입니다.")
            return
    if len(_COMPARE) >= _COMPARE_MAX:
        window.alert("최대 %d 종목까지 비교할 수 있습니다." % _COMPARE_MAX)
        return
    _COMPARE.append({
        "symbol": sym,
        "data": _LAST_STOCK["data"],
        "valuation": _LAST_STOCK["valuation"],
        "cur": _LAST_STOCK["cur"],
    })
    render_compare()


def _on_clear_compare(event):
    _COMPARE.clear()
    render_compare()


def _make_remove_handler(sym):
    def handler(event):
        for i in range(len(_COMPARE)):
            if _COMPARE[i]["symbol"] == sym:
                _COMPARE.pop(i)
                break
        render_compare()
    return handler


def _make_detail_handler(sym):
    def handler(event):
        # 선택한 종목의 심볼을 조회 입력창에 넣고 조회를 실행한다.
        document.querySelector("#ticker").value = sym
        document.querySelector("#exchange").value = ""
        document.querySelector("#lookupBtn").click()
        try:
            document.querySelector("#tab-stock").scrollIntoView()
        except Exception:
            pass
    return handler

_FIN_STATE = {}
_PROXIES = []


def _bind(el, event, handler):
    """DOM 요소에 이벤트 핸들러를 바인딩(프록시는 GC 방지를 위해 보관)."""
    if el is None:
        return
    proxy = create_proxy(handler)
    _PROXIES.append(proxy)
    el.addEventListener(event, proxy)


def _quarter_labels(fin, n):
    """분기 기간 라벨(예: '2025 Q4')을 유도한다. 연대순(과거→최신) 배열 반환.

    TradingView 는 분기 기간 라벨을 제공하지 않으므로, 최신 회계연도와
    '최근 4개 분기 매출 합계 ≈ 최신 연간 매출' 관계로 최신 분기 위치를 추정한다.
    """
    fy_h = fin.get("fiscal_period_fy_h") or []
    latest_fy = None
    if fy_h:
        try:
            latest_fy = int(fy_h[0])
        except (ValueError, TypeError):
            latest_fy = None
    if latest_fy is None:
        # 회계연도 정보가 없으면 최신부터 역순 번호를 라벨로 사용
        return list(reversed(["P%d" % (n - i) for i in range(n)]))

    q_rev = fin.get("total_revenue_fq_h") or []
    ann_rev = fin.get("total_revenue_fy_h") or []
    latest_ann_rev = ann_rev[0] if ann_rev else None

    off = 0  # 최신 회계연도 이후로 이미 발표된 분기 수(0~3)
    if latest_ann_rev:
        best = None
        for o in range(4):
            win = q_rev[o:o + 4]
            if len(win) < 4 or any(x is None for x in win):
                continue
            d = abs(sum(win) - latest_ann_rev)
            if best is None or d < best:
                best, off = d, o

    if off > 0:
        year, q = latest_fy + 1, off
    else:
        year, q = latest_fy, 4

    newest_first = []
    for _ in range(n):
        newest_first.append("%d Q%d" % (year, q))
        q -= 1
        if q == 0:
            q, year = 4, year - 1
    return list(reversed(newest_first))


def _build_financial_metrics(fin, mode="annual"):
    """재무 히스토리 배열에서 지표 목록을 만든다. (periods, metrics) 반환.

    mode="annual"  → 연도별(_fy_h), mode="quarterly" → 분기별(_fq_h).
    배열은 최신→과거 순이므로 뒤집어 과거→최신(연대순)으로 정렬한다.
    """
    quarterly = mode == "quarterly"
    sfx = "fq_h" if quarterly else "fy_h"
    eps_key = ("earnings_per_share_diluted_" + sfx if quarterly
               else "earnings_per_share_basic_fy_h")
    lag = 4 if quarterly else 1  # 성장률: 분기는 전년동기(YoY), 연간은 전년

    if quarterly:
        n = len(fin.get("total_revenue_fq_h") or [])
        years = _quarter_labels(fin, n)
    else:
        years = list(reversed(fin.get("fiscal_period_fy_h") or []))
        n = len(years)

    def arr(key):
        v = list(reversed(fin.get(key) or []))
        return [v[i] if i < len(v) else None for i in range(n)]

    rev = arr("total_revenue_" + sfx)
    gp = arr("gross_profit_" + sfx)
    ni = arr("net_income_" + sfx)
    ebitda = arr("ebitda_" + sfx)
    fcf = arr("free_cash_flow_" + sfx)
    eps = arr(eps_key)
    dps = arr("dps_common_stock_prim_issue_" + sfx)
    assets = arr("total_assets_" + sfx)
    debt = arr("total_debt_" + sfx)

    def ratio(a, b, scale=1.0):
        out = []
        for x, y in zip(a, b):
            if x is None or y is None or y == 0:
                out.append(None)
            else:
                out.append(x / y * scale)
        return out

    def growth(a):
        out = [None] * min(lag, len(a))
        for i in range(lag, len(a)):
            p, c = a[i - lag], a[i]
            if p is None or c is None or p == 0:
                out.append(None)
            else:
                out.append((c - p) / abs(p) * 100.0)
        return out

    eps_label = "EPS (희석)" if quarterly else "EPS (기본)"
    metrics = [
        {"key": "revenue", "label": "매출 (Revenue)", "kind": "money", "values": rev},
        {"key": "net_income", "label": "순이익 (Net Income)", "kind": "money", "values": ni},
        {"key": "gross_profit", "label": "매출총이익 (Gross Profit)", "kind": "money", "values": gp},
        {"key": "ebitda", "label": "EBITDA", "kind": "money", "values": ebitda},
        {"key": "fcf", "label": "잉여현금흐름 (FCF)", "kind": "money", "values": fcf},
        {"key": "eps", "label": eps_label, "kind": "cur", "values": eps},
        {"key": "dps", "label": "주당배당금 (DPS)", "kind": "cur", "values": dps},
        {"key": "assets", "label": "총자산 (Total Assets)", "kind": "money", "values": assets},
        {"key": "debt", "label": "총부채 (Total Debt)", "kind": "money", "values": debt},
        {"key": "gross_margin", "label": "매출총이익률 (%)", "kind": "pct", "values": ratio(gp, rev, 100.0)},
        {"key": "net_margin", "label": "순이익률 (%)", "kind": "pct", "values": ratio(ni, rev, 100.0)},
        {"key": "ebitda_margin", "label": "EBITDA 마진 (%)", "kind": "pct", "values": ratio(ebitda, rev, 100.0)},
        {"key": "fcf_margin", "label": "FCF 마진 (%)", "kind": "pct", "values": ratio(fcf, rev, 100.0)},
        {"key": "debt_assets", "label": "부채/자산 (%)", "kind": "pct", "values": ratio(debt, assets, 100.0)},
        {"key": "rev_growth", "label": "매출성장률 YoY (%)", "kind": "pct", "values": growth(rev)},
        {"key": "ni_growth", "label": "순이익성장률 YoY (%)", "kind": "pct", "values": growth(ni)},
    ]

    # 현재값(TTM/최근분기) - 올해 진행 중인 실적 확인용 (모드 공통)
    rev_c = fin.get("total_revenue_ttm")
    gp_c = fin.get("gross_profit_ttm")
    ni_c = fin.get("net_income_ttm")
    ebitda_c = fin.get("ebitda_ttm")
    fcf_c = fin.get("free_cash_flow_ttm")
    eps_c = fin.get("earnings_per_share_basic_ttm")
    dps_c = fin.get("dps_common_stock_prim_issue_ttm")
    assets_c = fin.get("total_assets_fq")
    debt_c = fin.get("total_debt_fq")

    def rc(a, b, scale=1.0):
        if a is None or b is None or b == 0:
            return None
        return a / b * scale

    # 현재값 성장률은 모드와 무관하게 TTM 대비 최신 연간 실적으로 계산
    ann_rev = list(reversed(fin.get("total_revenue_fy_h") or []))
    ann_ni = list(reversed(fin.get("net_income_fy_h") or []))

    def gc(cur_val, series):
        prev = series[-1] if series else None
        if cur_val is None or prev is None or prev == 0:
            return None
        return (cur_val - prev) / abs(prev) * 100.0

    current = {
        "revenue": rev_c, "net_income": ni_c, "gross_profit": gp_c,
        "ebitda": ebitda_c, "fcf": fcf_c, "eps": eps_c, "dps": dps_c,
        "assets": assets_c, "debt": debt_c,
        "gross_margin": rc(gp_c, rev_c, 100.0),
        "net_margin": rc(ni_c, rev_c, 100.0),
        "ebitda_margin": rc(ebitda_c, rev_c, 100.0),
        "fcf_margin": rc(fcf_c, rev_c, 100.0),
        "debt_assets": rc(debt_c, assets_c, 100.0),
        "rev_growth": gc(rev_c, ann_rev),
        "ni_growth": gc(ni_c, ann_ni),
    }
    for m in metrics:
        m["current"] = current.get(m["key"])
    return years, metrics


def _get_metric(key):
    for m in _FIN_STATE.get("metrics", []):
        if m["key"] == key:
            return m
    metrics = _FIN_STATE.get("metrics") or [None]
    return metrics[0]


def _metric_axis_fmt(kind, v):
    """차트 축·포인트용 간결 포맷."""
    if v is None:
        return "-"
    if kind == "money":
        return fmt_large(v)
    if kind == "pct":
        return "%s%%" % fmt_num(v, 1)
    return fmt_num(v, 2)


def _metric_cell_fmt(kind, v, cur):
    """표 셀용 포맷(통화·단위 포함)."""
    if v is None:
        return "-"
    if kind == "money":
        return fmt_large(v, cur)
    if kind == "pct":
        return "%s%%" % fmt_num(v, 2)
    if kind == "cur":
        return "%s %s" % (fmt_num(v, 2), cur)
    return fmt_num(v, 2)


def _fin_chart_svg(metric, sel_years, cur):
    """선택 지표를 막대그래프 + 꺾은선그래프로 겹쳐 그린 SVG 를 반환."""
    years = _FIN_STATE.get("years", [])
    vmap = dict(zip(years, metric["values"]))
    data = [(y, vmap.get(y)) for y in sel_years]
    cur_val = metric.get("current")
    if cur_val is not None and _FIN_STATE.get("period") != "quarterly":
        data.append(("현재", cur_val))
    vals = [v for _, v in data if v is not None]
    if not sel_years or not vals:
        return '<div class="hint">차트를 표시할 데이터가 없습니다. (연도를 선택하세요)</div>'

    vmax = max(vals)
    vmin = min(vals)
    if vmin > 0:
        vmin = 0.0
    if vmax < 0:
        vmax = 0.0
    if vmax == vmin:
        vmax = vmin + 1.0

    W, H = 760.0, 300.0
    padL, padR, padT, padB = 66.0, 18.0, 22.0, 40.0
    plot_w = W - padL - padR
    plot_h = H - padT - padB
    n = len(data)
    kind = metric["kind"]

    def X(i):
        return padL + plot_w * ((i + 0.5) / n)

    def Y(v):
        return padT + (vmax - v) / (vmax - vmin) * plot_h

    parts = ['<svg viewBox="0 0 %g %g" class="chart-svg" '
             'preserveAspectRatio="xMidYMid meet">' % (W, H)]

    if vmin < 0 < vmax:
        grid_vals = [vmax, 0.0, vmin]
    else:
        grid_vals = [vmax, (vmax + vmin) / 2.0, vmin]
    for gv in grid_vals:
        gy = Y(gv)
        parts.append('<line x1="%g" y1="%g" x2="%g" y2="%g" stroke="#eaecef"/>'
                     % (padL, gy, W - padR, gy))
        parts.append('<text x="%g" y="%g" class="ax-y">%s</text>'
                     % (padL - 8, gy + 4, _esc(_metric_axis_fmt(kind, gv))))

    y0 = Y(0.0)
    bar_w = plot_w / n * 0.55
    # 막대그래프
    for i, (yr, v) in enumerate(data):
        if v is None:
            continue
        cx = X(i)
        top = Y(v)
        by = min(top, y0)
        bh = abs(top - y0)
        parts.append('<rect x="%g" y="%g" width="%g" height="%g" rx="3" '
                     'class="bar-rect"/>' % (cx - bar_w / 2, by, bar_w, max(bh, 0.5)))

    # 꺾은선그래프 (동일 값 위에 겹침)
    pts = ["%g,%g" % (X(i), Y(v)) for i, (yr, v) in enumerate(data) if v is not None]
    if len(pts) >= 2:
        parts.append('<polyline points="%s" class="line-path" fill="none"/>'
                     % " ".join(pts))
    for i, (yr, v) in enumerate(data):
        if v is None:
            continue
        parts.append('<circle cx="%g" cy="%g" r="3.5" class="line-dot"/>'
                     % (X(i), Y(v)))
        parts.append('<text x="%g" y="%g" class="pt-val">%s</text>'
                     % (X(i), Y(v) - 8, _esc(_metric_axis_fmt(kind, v))))

    # x축 연도 라벨
    for i, (yr, v) in enumerate(data):
        parts.append('<text x="%g" y="%g" class="ax-x">%s</text>'
                     % (X(i), H - padB + 22, _esc(str(yr))))

    parts.append('</svg>')
    return "".join(parts)


def _fin_table(metrics, sel_years, cur):
    if not sel_years:
        return '<div class="hint">표시할 기간을 선택하세요.</div>'
    years = _FIN_STATE.get("years", [])
    show_cur = _FIN_STATE.get("period") != "quarterly"
    idx = {y: i for i, y in enumerate(years)}
    html = ['<div class="fin-table-wrap"><table class="fin-table"><thead><tr>'
            '<th>지표</th>']
    for y in sel_years:
        html.append('<th>%s</th>' % _esc(str(y)))
    if show_cur:
        html.append('<th class="cur-col">현재 (TTM)</th>')
    html.append('</tr></thead><tbody>')
    for m in metrics:
        rowcls = ' class="sel-metric"' if m["key"] == _FIN_STATE.get("metric") else ''
        html.append('<tr%s><td>%s</td>' % (rowcls, _esc(m["label"])))
        for y in sel_years:
            v = m["values"][idx[y]] if y in idx else None
            html.append('<td>%s</td>' % _esc(_metric_cell_fmt(m["kind"], v, cur)))
        if show_cur:
            cv = m.get("current")
            html.append('<td class="cur-col">%s</td>'
                        % _esc(_metric_cell_fmt(m["kind"], cv, cur)))
        html.append('</tr>')
    html.append('</tbody></table></div>')
    return "".join(html)

    st = _FIN_STATE
    years = st.get("years", [])

    cur = st.get("currency", "")
    period = st.get("period", "annual")

                    % ("on" if quarterly else ""))

    html.append('<span class="fin-quick">%s: '
                '<button type="button" data-yq="5">최근5</button>'

            "선택한 지표는 표에서 강조됩니다.")
    html.append('<div class="hint">%s</div>' % note)
    html.append('</div></div>')

    document.querySelector("#fin-section").innerHTML = "".join(html)

    wrap = document.querySelector("#fin-section .fin-table-wrap")

    _bind(document.querySelector("#fin-metric"), "change", _on_metric_change)
    quick = document.querySelectorAll("[data-yq]")
    for i in range(quick.length):
        _bind(quick.item(i), "click", _on_year_quick)

    _FIN_STATE["metric"] = document.querySelector("#fin-metric").value
    refresh_financials()


def _on_period_change(evt):
    period = evt.target.getAttribute("data-fp")
    if period and period != _FIN_STATE.get("period"):
        _apply_fin_period(period)


def _on_year_quick(evt):
    q = evt.target.getAttribute("data-yq")
    years = _FIN_STATE.get("years", [])
    if q == "all":
        sel = set(years)
    elif q == "5":
        sel = set(years[-5:])
    else:
        sel = set(years[-10:])
    _FIN_STATE["sel_years"] = sel
    refresh_financials()


def init_financials(full_symbol, fin, currency):
    """연도별/분기별 지표 섹션을 초기화한다. 데이터가 없으면 안내 문구를 표시."""
    container = document.querySelector("#fin-section")
    if container is None:
        return
    if not fin or not (fin.get("fiscal_period_fy_h")):
        container.innerHTML = ('<div class="card"><div class="sec">'
                               '<h3>재무 지표</h3><div class="hint">'
                               '이 종목은 재무 데이터를 제공하지 않습니다.'
                               '</div></div></div>')
        return
    _FIN_STATE.clear()
    _FIN_STATE.update({
        "symbol": full_symbol,
        "currency": currency or "",
        "fin": fin,
        "period": "annual",
        "metric": None,
        # 분기별 데이터 제공 여부(라벨 유도 가능 여부와 무관하게 매출 배열 존재)
        "has_quarterly": bool(fin.get("total_revenue_fq_h")),
    })
    _apply_fin_period("annual")


def _apply_fin_period(period):
    """연간/분기 모드를 적용해 지표·기간·선택기간을 재계산한다."""
    st = _FIN_STATE
    fin = st.get("fin")
    if not fin:
        return
    years, metrics = _build_financial_metrics(fin, period)
    recent = years[-10:] if len(years) > 10 else years
    keep = st.get("metric")
    if not any(m["key"] == keep for m in metrics):
        keep = metrics[0]["key"] if metrics else None
    st["period"] = period
    st["years"] = years
    st["metrics"] = metrics
    st["sel_years"] = set(recent)
    st["metric"] = keep
    refresh_financials()

async def fetch_fred_series(ind, api_key):
    """FRED 관측치를 조회해 최근 2개 유효값을 반환. 실패 시 None."""
    params = {
        "series_id": ind["series"], "api_key": api_key, "file_type": "json",
        "sort_order": "desc", "limit": 12,
    }
    if ind.get("units"):
        params["units"] = ind["units"]
    try:
        data = await _get_json(FRED_OBS_URL, params)
    except InvestingApiError:
        return None
    obs = data.get("observations") if isinstance(data, dict) else None
    if not obs:
        return None
    nums = []
    for o in obs:
        s = o.get("value")
        if s in (None, ".", ""):
            continue
        try:
            f = float(s)
        except (ValueError, TypeError):
            continue
        nums.append((o.get("date"), f))
        if len(nums) >= 2:
            break
    if not nums:
        return None
    date0, v0 = nums[0]
    v1 = nums[1][1] if len(nums) > 1 else None
    return {"date": date0, "value": v0, "prev": v1}

    params = {

def _dbnomics_series_url(ind):

async def _dbnomics_points(ind):
    """DBnomics 시리즈를 (period, value) 연대순 리스트로 반환. 실패 시 None."""
    try:
        data = await _get_json(_dbnomics_series_url(ind),
                               {"observations": "1", "format": "json"})
    except InvestingApiError:
        return None
    if not isinstance(data, dict):
        return None
    series = data.get("series") or {}
    docs = series.get("docs") or []
    if not docs:
        return None
    doc = docs[0]
    periods = doc.get("period") or []
    values = doc.get("value") or []
    # 지표에 vmin/vmax 가 설정된 경우, 현실적 범위 밖의 값은 버린다.
    # (DBnomics ISM 피드가 간헐 깨진 값(예: PMI 10.x)을 내보내는 경우 방지)
    vmin = ind.get("vmin")
    vmax = ind.get("vmax")
    pts = []
    for i in range(min(len(periods), len(values))):
        v = values[i]
        if not isinstance(v, (int, float)):
            continue
        fv = float(v)
        if vmin is not None and fv < vmin:
            continue
        if vmax is not None and fv > vmax:
            continue
        pts.append((periods[i], fv))
    return pts


async def fetch_dbnomics_series(ind):
    """DBnomics 시리즈의 최근 2개 유효값을 반환. 실패 시 None. (FRED 와 동일 형식)"""
    pts = await _dbnomics_points(ind)
    if not pts:
        return None
    date0, v0 = pts[-1]
    v1 = pts[-2][1] if len(pts) >= 2 else None
    return {"date": date0, "value": v0, "prev": v1}


async def fetch_dbnomics_chart(ind, freq="q"):
    """DBnomics 월별 시계열을 주기(월/분기/연도)에 맞게 반환 [(라벨, 값)]."""
    pts = await _dbnomics_points(ind)
    if not pts:
        return None
    meta = FREQ_META.get(freq, FREQ_META["q"])
    limit = meta["limit"]
    if freq == "m":
        # 월별 원본을 그대로 사용
        out = []
        for period, v in pts:
            try:
                y_str, m_str = period.split("-")[:2]
                label = "'%s.%s" % (y_str[2:], m_str)
            except (ValueError, AttributeError):
                label = period
            out.append((label, v))
        if len(out) > limit:
            out = out[-limit:]
        return out
    groups = {}
    order = []
    for period, v in pts:
        try:
            y_str, m_str = period.split("-")[:2]
            y, m = int(y_str), int(m_str)
        except (ValueError, AttributeError):
            continue
        if freq == "a":
            key = "%04d" % y
            label = "%04d" % y
        else:
            q = (m - 1) // 3 + 1
            key = "%04d-Q%d" % (y, q)
            label = "'%s Q%d" % (("%04d" % y)[2:], q)
        if key not in groups:
            groups[key] = [label, 0.0, 0]
            order.append(key)
        groups[key][1] += v
        groups[key][2] += 1
    out = []
    for key in order:
        label, total, cnt = groups[key]
        out.append((label, total / cnt if cnt else None))
    limit = meta["limit"]
    if len(out) > limit:
        out = out[-limit:]
    return out

def _q_label(d):
    """FRED 날짜(YYYY-MM-DD)를 '24 Q1 형식 분기 라벨로 변환."""
    try:
        y, m, _ = d.split("-")
        q = (int(m) - 1) // 3 + 1
        return "'%s Q%d" % (y[2:], q)
    except (ValueError, AttributeError):
        return d or ""


# 차트 주기(월/분기/연도) 메타. fred=FRED frequency 코드, limit=조회 개수
FREQ_META = {
    "m": {"fred": "m", "limit": 36, "label": "월"},
    "q": {"fred": "q", "limit": 24, "label": "분기"},
    "a": {"fred": "a", "limit": 20, "label": "연도"},
}

# 현재 선택된 차트 상태(지표 · 주기)
_MACRO_CHART = {"series": None, "freq": "q"}


def _freq_label(d, freq):
    """주기에 맞게 카테고리축 라벨 생성. 연도=YYYY, 분기='YY Qn, 월='YY.MM."""
    try:
        y, m, _ = d.split("-")
        if freq == "a":
            return y
        if freq == "m":
            return "'%s.%s" % (y[2:], m)
        q = (int(m) - 1) // 3 + 1
        return "'%s Q%d" % (y[2:], q)
    except (ValueError, AttributeError):
        return d or ""


async def fetch_fred_chart(ind, api_key, freq="q"):
    """주기(분기/연도) 단위 관측치를 조회해 [(라벨, 값), ...] (연대순) 반환."""
    meta = FREQ_META.get(freq, FREQ_META["q"])
    params = {
        "series_id": ind["series"], "api_key": api_key, "file_type": "json",
        "sort_order": "desc", "limit": meta["limit"],
        "frequency": meta["fred"], "aggregation_method": "avg",
    }
    if ind.get("units"):
        params["units"] = ind["units"]
    try:
        data = await _get_json(FRED_OBS_URL, params)
    except InvestingApiError:
        return None
    obs = data.get("observations") if isinstance(data, dict) else None
    if not obs:
        return None
    pts = []
    for o in obs:  # 최신→과거 순서
        s = o.get("value")
        val = None
        if s not in (None, ".", ""):
            try:
                val = float(s)
            except (ValueError, TypeError):
                val = None
        pts.append((_freq_label(o.get("date"), freq), val))
    pts.reverse()  # 과거→최신(연대순)
    return pts


def _macro_chart_svg(ind, points):
    """분기별 시계열을 막대+꺾은선 그래프 SVG 로 반환. points=[(라벨, 값)]."""
    data = points or []
    vals = [v for _, v in data if v is not None]
    if not vals:
        return '<div class="hint">차트를 표시할 데이터가 없습니다.</div>'

    baseline = ind.get("baseline")
    vmax = max(vals)
    vmin = min(vals)
    if baseline is not None:
        # 기준선(예: PMI 50)이 있는 레벨 지표는 0 강제 대신 값+기준선 범위에 여백을 둔다.
        vmax = max(vmax, baseline)
        vmin = min(vmin, baseline)
        pad = (vmax - vmin) * 0.15 or 1.0
        vmax += pad
        vmin -= pad
        zero = baseline
    else:
        if vmin > 0:
            vmin = 0.0
        if vmax < 0:
            vmax = 0.0
        zero = 0.0
    if vmax == vmin:
        vmax = vmin + 1.0

    W, H = 820.0, 320.0
    padL, padR, padT, padB = 66.0, 18.0, 22.0, 46.0
    plot_w = W - padL - padR
    plot_h = H - padT - padB
    n = len(data)
    dec = ind.get("dec", 2)

    def X(i):
        return padL + plot_w * ((i + 0.5) / n)

    def Y(v):
        return padT + (vmax - v) / (vmax - vmin) * plot_h

    def axfmt(v):
        return "-" if v is None else "{:,.{d}f}".format(v, d=dec)

    parts = ['<svg viewBox="0 0 %g %g" class="chart-svg" '
             'preserveAspectRatio="xMidYMid meet">' % (W, H)]

    if baseline is not None:
        grid_vals = [vmax, baseline, vmin]
    elif vmin < 0 < vmax:
        grid_vals = [vmax, 0.0, vmin]
    else:
        grid_vals = [vmax, (vmax + vmin) / 2.0, vmin]
    for gv in grid_vals:
        gy = Y(gv)
        parts.append('<line x1="%g" y1="%g" x2="%g" y2="%g" stroke="#eaecef"/>'
                     % (padL, gy, W - padR, gy))
        parts.append('<text x="%g" y="%g" class="ax-y">%s</text>'
                     % (padL - 8, gy + 4, _esc(axfmt(gv))))

    # 기준선(PMI 50 등) 강조 표시
    if baseline is not None:
        gy = Y(baseline)
        parts.append('<line x1="%g" y1="%g" x2="%g" y2="%g" '
                     'stroke="#f23645" stroke-width="1.3" stroke-dasharray="6 4"/>'
                     % (padL, gy, W - padR, gy))
        parts.append('<text x="%g" y="%g" class="ax-y" '
                     'style="fill:#f23645;font-weight:700">%s</text>'
                     % (W - padR - 2, gy - 4, _esc(axfmt(baseline))))

    y0 = Y(zero)
    bar_w = plot_w / n * 0.55
    for i, (lb, v) in enumerate(data):
        if v is None:
            continue
        cx = X(i)
        top = Y(v)
        by = min(top, y0)
        bh = abs(top - y0)
        parts.append('<rect x="%g" y="%g" width="%g" height="%g" rx="3" '
                     'class="bar-rect"/>' % (cx - bar_w / 2, by, bar_w, max(bh, 0.5)))

    pts = ["%g,%g" % (X(i), Y(v)) for i, (lb, v) in enumerate(data) if v is not None]
    if len(pts) >= 2:
        parts.append('<polyline points="%s" class="line-path" fill="none"/>'
                     % " ".join(pts))
    step = 1 if n <= 16 else (n // 16 + 1)
    for i, (lb, v) in enumerate(data):
        if v is None:
            continue
        parts.append('<circle cx="%g" cy="%g" r="3.5" class="line-dot"/>'
                     % (X(i), Y(v)))
        if i % step == 0 or i == n - 1:
            parts.append('<text x="%g" y="%g" class="pt-val">%s</text>'
                         % (X(i), Y(v) - 8, _esc(axfmt(v))))

    for i, (lb, v) in enumerate(data):
        if i % step != 0 and i != n - 1:
            continue
        parts.append('<text x="%g" y="%g" class="ax-x">%s</text>'
                     % (X(i), H - padB + 24, _esc(lb)))

    parts.append('</svg>')
    return "".join(parts)

    ind = None

        return
    if ind.get("source") == "tv":
        _highlight_macro_row(series)

        return
    if freq not in FREQ_META:
        freq = _MACRO_CHART.get("freq", "q")
    _MACRO_CHART["series"] = series
    _MACRO_CHART["freq"] = freq
    box = document.querySelector("#macro-chart")
    is_db = ind.get("source") == "db"

    if not is_db and not key:

    try:
        if is_db:
            pts = await fetch_dbnomics_chart(ind, freq)
        else:
            pts = await fetch_fred_chart(ind, key, freq)
    except InvestingApiError:
        pts = None

        return

    html.append('<div class="sec">')

    html.append('<div class="hint">출처: %s · 최근 %d개 %s(%s 평균) 기준'
                '%s. 막대=값, 꺾은선=추세.</div>'
                % (_esc(src_txt), len(pts), _esc(freq_label), _esc(freq_label), unit_txt))
    html.append('</div></div>')
    box.innerHTML = "".join(html)
    _bind_macro_freq(series)

async def _sec_get_json(url):
    """SEC EDGAR JSON 조회(프록시 경유). 실패 시 None."""
    try:
        resp = await pyfetch(_proxied(url), method="GET")
    except Exception as exc:
        _SEC_LAST_ERR["msg"] = "네트워크 오류(%s): %s" % (url, exc)
        return None
    if resp.status >= 400:
        try:
            body = (await resp.string())[:160]
        except Exception:
            body = ""
        _SEC_LAST_ERR["msg"] = "HTTP %s · %s · 응답: %s" % (resp.status, url, body)
        return None
    try:
        return json.loads(await resp.string())
    except ValueError:
        _SEC_LAST_ERR["msg"] = "JSON 파싱 실패 · %s" % url
        return None


async def _sec_get_text(url):
    """SEC EDGAR 텍스트/XML 조회(프록시 경유). 실패 시 None."""
    try:
        resp = await pyfetch(_proxied(url), method="GET")
    except Exception as exc:
        _SEC_LAST_ERR["msg"] = "네트워크 오류(%s): %s" % (url, exc)
        return None
    if resp.status >= 400:
        try:
            body = (await resp.string())[:160]
        except Exception:
            body = ""
        _SEC_LAST_ERR["msg"] = "HTTP %s · %s · 응답: %s" % (resp.status, url, body)
        return None
    return await resp.string()


def _local_tag(tag):
    """네임스페이스 접두어를 제거한 로컬 태그명."""
    return tag.split("}", 1)[-1] if "}" in tag else tag


def _parse_info_table(xml_text):
    """13F 정보표 XML 을 파싱해 보유내역 리스트를 반환.

    각 항목: {issuer, title, cusip, value, shares, sh_prn, put_call}
    value 는 원문 보고값(단위는 filing 시점에 따라 천 달러 또는 달러).
    """
    import xml.etree.ElementTree as ET
    try:
        root = ET.fromstring(xml_text)
    except ET.ParseError:
        return None
    rows = []
    for el in root.iter():
        if _local_tag(el.tag) != "infoTable":
            continue
        rec = {"issuer": "", "title": "", "cusip": "", "value": 0.0,
               "shares": 0.0, "sh_prn": "SH", "put_call": ""}
        for child in el.iter():
            t = _local_tag(child.tag)
            txt = (child.text or "").strip()
            if t == "nameOfIssuer":
                rec["issuer"] = txt
            elif t == "titleOfClass":
                rec["title"] = txt
            elif t == "cusip":
                rec["cusip"] = txt
            elif t == "value":
                try:
                    rec["value"] = float(txt.replace(",", ""))
                except ValueError:
                    rec["value"] = 0.0
            elif t == "sshPrnamt":
                try:
                    rec["shares"] = float(txt.replace(",", ""))
                except ValueError:
                    rec["shares"] = 0.0
            elif t == "sshPrnamtType":
                rec["sh_prn"] = txt or "SH"
            elif t == "putCall":
                rec["put_call"] = txt
        if rec["issuer"]:
            rows.append(rec)
    return rows


async def _list_13f_filings(cik_int):
    """CIK 의 13F-HR 제출 목록을 최신순으로 반환. 각 항목:
    {accession, filing_date, report_date}. 실패 시 None."""
    subs = await _sec_get_json(SEC_SUBMISSIONS_URL % cik_int)
    if not isinstance(subs, dict):
        if not _SEC_LAST_ERR["msg"]:
            _SEC_LAST_ERR["msg"] = "submissions 응답 없음 (CIK %d)" % cik_int
        return None
    recent = ((subs.get("filings") or {}).get("recent")) or {}
    forms = recent.get("form") or []
    accnos = recent.get("accessionNumber") or []
    fdates = recent.get("filingDate") or []
    rdates = recent.get("reportDate") or []
    out = []
    for i, f in enumerate(forms):
        if f in ("13F-HR", "13F-HR/A"):
            out.append({
                "accession": accnos[i] if i < len(accnos) else "",
                "filing_date": fdates[i] if i < len(fdates) else None,
                "report_date": rdates[i] if i < len(rdates) else None,
            })
    return out


def _unique_periods(filings):
    """분기(report_date)별로 가장 최근 제출본만 남겨 최신순 리스트로 반환."""
    seen = {}
    order = []
    for fl in filings:
        rd = fl.get("report_date")
        if rd and rd not in seen:
            seen[rd] = fl
            order.append(rd)
    return [seen[rd] for rd in order]


async def _fetch_13f_holdings(cik_int, accession):
    """특정 13F-HR 제출본의 보유내역(정보표)을 조회. 실패 시 None."""
    acc_nodash = accession.replace("-", "")
    dir_url = "%s/%d/%s" % (SEC_ARCHIVES_BASE, cik_int, acc_nodash)
    listing = await _sec_get_json(dir_url + "/index.json")
    info_file = None
    if isinstance(listing, dict):
        items = ((listing.get("directory") or {}).get("item")) or []
        xmls = [it.get("name") for it in items
                if str(it.get("name", "")).lower().endswith(".xml")]
        cands = [n for n in xmls if n and n.lower() != "primary_doc.xml"]
        # 이름에 table/info 가 들어간 파일 우선, 없으면 첫 후보 사용
        pref = [n for n in cands if "table" in n.lower() or "info" in n.lower()]
        if pref:
            info_file = pref[0]
        elif cands:
            info_file = cands[0]
    if info_file is None:
        if not _SEC_LAST_ERR["msg"]:
            _SEC_LAST_ERR["msg"] = "정보표 XML 을 찾지 못했습니다 · %s" % dir_url
        return None
    xml_text = await _sec_get_text("%s/%s" % (dir_url, info_file))
    if not xml_text:
        return None
    holdings = _parse_info_table(xml_text)
    if holdings is None:
        _SEC_LAST_ERR["msg"] = "정보표 XML 파싱 실패 · %s/%s" % (dir_url, info_file)
    return holdings


async def fetch_13f_latest(cik):
    """CIK 의 최근 13F-HR 보유내역과 전분기 보유내역(매매 비교용)을 조회.

    반환: {holdings, report_date, filing_date, accession,
           prev_holdings, prev_report_date} 또는 None
    """
    _SEC_LAST_ERR["msg"] = ""
    cik_int = int(cik)
    filings = await _list_13f_filings(cik_int)
    if not filings:
        if not _SEC_LAST_ERR["msg"]:
            _SEC_LAST_ERR["msg"] = "최근 제출목록에 13F-HR 이 없습니다 (CIK %d)" % cik_int
        return None
    periods = _unique_periods(filings)
    cur = periods[0]
    holdings = await _fetch_13f_holdings(cik_int, cur["accession"])
    if holdings is None:
        return None

    # 전분기 보유내역(매매 내역 계산용) - 조회 실패해도 치명적이지 않음
    prev_holdings = None
    prev_report = None
    if len(periods) > 1:
        prev = periods[1]
        prev_report = prev.get("report_date")
        prev_holdings = await _fetch_13f_holdings(cik_int, prev["accession"])

    return {"holdings": holdings, "report_date": cur.get("report_date"),
            "filing_date": cur.get("filing_date"), "accession": cur.get("accession"),
            "prev_holdings": prev_holdings, "prev_report_date": prev_report}


def _aggregate_holdings(holdings, dollars):
    """CUSIP+옵션 기준으로 합산하고 비중을 계산해 가치 내림차순 정렬."""
    agg = {}
    for h in holdings:
        key = (h["cusip"], h["put_call"])
        if key not in agg:
            agg[key] = {"issuer": h["issuer"], "cusip": h["cusip"],
                        "put_call": h["put_call"], "value": 0.0, "shares": 0.0}
        agg[key]["value"] += h["value"]
        agg[key]["shares"] += h["shares"]
    rows = list(agg.values())
    total = sum(r["value"] for r in rows) or 1.0
    for r in rows:
        r["value_usd"] = r["value"] * (1.0 if dollars else 1000.0)
        r["weight"] = r["value"] / total * 100.0
    rows.sort(key=lambda r: r["value"], reverse=True)
    return rows, total * (1.0 if dollars else 1000.0)


def _stock_shares_by_cusip(holdings):
    """옵션(put/call)을 제외한 주식 보유를 CUSIP 기준 수량으로 합산."""
    m = {}
    for h in holdings:
        if h.get("put_call"):
            continue
        c = h.get("cusip")
        if not c:
            continue
        if c not in m:
            m[c] = {"issuer": h["issuer"], "cusip": c, "shares": 0.0, "value": 0.0}
        m[c]["shares"] += h["shares"]
        m[c]["value"] += h["value"]
    return m


_ACTION_ORDER = {"신규": 0, "추가": 1, "축소": 2, "청산": 3}


def _compute_changes(cur_holdings, prev_holdings, dollars):
    """전분기 대비 주식 매매 내역을 계산. 변동이 있는 항목만 반환."""
    cur = _stock_shares_by_cusip(cur_holdings)
    prev = _stock_shares_by_cusip(prev_holdings)
    rows = []
    for c in set(cur) | set(prev):
        cs = cur.get(c, {}).get("shares", 0.0)
        ps = prev.get(c, {}).get("shares", 0.0)
        if cs == ps:
            continue  # 변동 없음(유지)
        issuer = (cur.get(c) or prev.get(c) or {}).get("issuer", "")
        delta = cs - ps
        if ps == 0 and cs > 0:
            action = "신규"
        elif cs == 0 and ps > 0:
            action = "청산"
        elif delta > 0:
            action = "추가"
        else:
            action = "축소"
        if ps > 0:
            pct = delta / ps * 100.0
        else:
            pct = 100.0
        value = cur.get(c, {}).get("value", 0.0)
        rows.append({"issuer": issuer, "cusip": c, "prev_shares": ps,
                     "cur_shares": cs, "delta": delta, "action": action,
                     "pct": pct, "value_usd": value * (1.0 if dollars else 1000.0)})
    rows.sort(key=lambda r: (_ACTION_ORDER.get(r["action"], 9), -abs(r["delta"])))
    return rows


# 보유종목 표(정렬/재렌더링용) 상태
_GURU_VIEW = {"rows": None, "has_prev": False,
              "sort_key": "value", "sort_dir": "desc"}


def _holdings_rows(holdings, prev_holdings, dollars):
    """옵션(put/call)을 제외한 주식 보유내역 행과 전분기 대비 변화율을 계산.

    반환: (rows, total_usd). rows 각 항목은
    {issuer, weight, value_usd, shares, change_val, change_disp}.
    change_val 은 정렬용(신규는 +inf), change_disp 는 표시용.
    """
    cur = _stock_shares_by_cusip(holdings)
    prev = _stock_shares_by_cusip(prev_holdings) if prev_holdings else {}
    total = sum(v["value"] for v in cur.values()) or 1.0
    mult = 1.0 if dollars else 1000.0
    rows = []
    for c, v in cur.items():
        cs = v["shares"]
        ps = prev.get(c, {}).get("shares", 0.0)
        if not prev_holdings:
            change_val = None
            change_disp = "-"
        elif ps == 0:
            change_val = float("inf")
            change_disp = "신규"
        else:
            pct = (cs - ps) / ps * 100.0
            change_val = pct
            change_disp = "%s%.1f%%" % ("+" if pct >= 0 else "", pct)
        rows.append({
            "issuer": v["issuer"], "weight": v["value"] / total * 100.0,
            "value_usd": v["value"] * mult, "shares": cs,
            "change_val": change_val, "change_disp": change_disp,
        })
    return rows, total * mult


def _sort_holdings(rows, key, direction):
    """지정한 열·방향으로 보유종목 행을 정렬."""
    def keyfn(r):
        if key == "issuer":
            return r["issuer"].lower()
        if key == "weight":
            return r["weight"]
        if key == "shares":
            return r["shares"]
        if key == "change":
            v = r["change_val"]
            return v if isinstance(v, (int, float)) else float("-inf")
        return r["value_usd"]
    return sorted(rows, key=keyfn, reverse=(direction == "desc"))

    """현재 정렬 상태로 보유종목 표를 #guru-holdings 에 렌더링."""

    for i, r in enumerate(sorted_rows, 1):

    _bind_holdings_sort()

                   else ("청산" if c["action"] == "청산"
                         else "%s%.1f%%" % (sign, c["pct"])))
        html.append('<tr><td>%d</td><td>%s</td>'
                    '<td class="%s">%s</td>'
                    '<td class="num">%s</td><td class="num">%s</td>'
                    '<td class="num %s">%s%s</td>'
                    '<td class="num %s">%s</td></tr>'
                    % (i, _esc(c["issuer"]), cls, _esc(c["action"]),
                       _esc(fmt_num(c["prev_shares"], 0)),
                       _esc(fmt_num(c["cur_shares"], 0)),
                       cls, sign, _esc(fmt_num(c["delta"], 0)),
                       cls, _esc(pct_txt)))
    html.append('</tbody></table></div>')
    box.innerHTML = "".join(html)
    _bind_changes_sort()

def render_13f(guru, data):
    """13F 보유내역을 표로 렌더링."""
    holdings = data.get("holdings") or []
    prev_holdings = data.get("prev_holdings")
    prev_report = data.get("prev_report_date") or ""
    filing_date = data.get("filing_date") or ""
    report_date = data.get("report_date") or ""

    # 2023년 SEC 개정 이후 제출분은 가치를 '달러' 단위로 보고(이전은 '천 달러').
    dollars = False
    try:
        dollars = int((filing_date or "0")[:4]) >= 2023
    except ValueError:
        dollars = False

    # 보유종목(옵션 제외) 행 계산 및 정렬 상태 초기화
    h_rows, total_usd = _holdings_rows(holdings, prev_holdings, dollars)
    _GURU_VIEW["rows"] = h_rows
    _GURU_VIEW["has_prev"] = bool(prev_holdings)
    _GURU_VIEW["sort_key"] = "value"
    _GURU_VIEW["sort_dir"] = "desc"

    html = ['<div class="card">']
    html.append('<div class="card-head"><div>'
                '<span class="name">%s (%s)</span>'
                '<span class="sym">[%s]</span></div>'
                '<div class="price">보고 기준일 %s · 제출일 %s · 총 %d 종목(옵션 제외) · 평가액 %s</div>'
                '</div>'
                % (_esc(guru["ko"]), _esc(guru["name"]), _esc(guru["firm"]),
                   _esc(report_date or "-"), _esc(filing_date or "-"),
                   len(h_rows), _esc(fmt_large(total_usd, "USD"))))

    # ── 최근 분기 매매 내역 (전분기 대비) ──
    html.append('<div class="sec"><h3>최근 분기 매매 내역 (전분기 대비)</h3>')
    if not prev_holdings:
        html.append('<div class="hint">전분기 13F 공시가 없어 매매 내역을 '
                    '계산할 수 없습니다. (아래는 현재 보유 현황입니다.)</div>')
        _GURU_CHG["rows"] = None
    else:
        changes = _compute_changes(holdings, prev_holdings, dollars)
        buys = sum(1 for c in changes if c["action"] in ("신규", "추가"))
        sells = sum(1 for c in changes if c["action"] in ("축소", "청산"))
        _GURU_CHG["rows"] = changes
        _GURU_CHG["sort_key"] = "action"
        _GURU_CHG["sort_dir"] = "asc"
        html.append('<div class="hint">기준: %s → %s · 매수(신규·추가) %d 건 · '
                    '매도(축소·청산) %d 건</div>'
                    % (_esc(prev_report or "-"), _esc(report_date or "-"), buys, sells))
        html.append('<div class="hint">열 제목을 클릭하면 오름/내림차순으로 정렬됩니다.</div>')
        html.append('<div id="guru-changes"></div>')
    html.append('</div>')

    # ── 보유종목 (옵션 제외 · 정렬 가능) ──
    html.append('<div class="sec"><h3>보유종목 (13F Holdings · 옵션 제외)</h3>')
    html.append('<div class="hint">열 제목을 클릭하면 오름/내림차순으로 정렬됩니다.</div>')
    html.append('<div id="guru-holdings"></div>')
    html.append('</div>')

    html.append('<div class="sec"><div class="hint">출처: SEC EDGAR (13F-HR) · '
                '매매 내역은 최근 분기와 직전 분기 보유수량 차이로 산출한 것으로, '
                '분기 중 매매 후 청산분 등은 반영되지 않습니다. '
                '평가액은 공시 시점 종가 기준이며 최대 45일 지연된 분기 스냅샷입니다. '
                '2023년 SEC 개정 전 공시는 천 달러 단위로 보고되어 자동 환산했습니다.'
                '</div></div>')
    html.append('</div>')
    document.querySelector("#guru-result").innerHTML = "".join(html)
    if prev_holdings:
        _render_changes()
    _render_holdings()


async def show_guru(cik):
    """대가 선택 시 13F 보유내역을 조회·표시."""
    guru = _guru_by_cik(cik)
    if guru is None:
        return
    _GURU_STATE["cik"] = cik
    render_guru_list(_filter_gurus(document.querySelector("#guru-search").value))
    _set_guru_status("%s 13F 조회 중..." % guru["ko"])
    document.querySelector("#guru-result").innerHTML = (
        '<div class="card"><div class="sec"><div class="hint">'
        'SEC EDGAR 에서 최근 13F 공시를 불러오는 중...</div></div></div>')
    try:
        data = await fetch_13f_latest(cik)
    except Exception as exc:
        _set_guru_status("오류")
        document.querySelector("#guru-result").innerHTML = (
            '<div class="card"><div class="sec"><div class="hint">'
            '조회 중 오류가 발생했습니다: %s</div></div></div>' % _esc(str(exc)))
        return
    if data is None:
        _set_guru_status("실패 · 데이터 없음")
        reason = _SEC_LAST_ERR.get("msg") or "최근 13F-HR 공시를 찾지 못했습니다."
        document.querySelector("#guru-result").innerHTML = (
            '<div class="card"><div class="sec">'
            '<h3>조회 실패</h3>'
            '<div class="hint">%s</div>'
            '<div class="hint">HTTP 403 이면 프록시(Cloudflare Worker)가 '
            'sec.gov 를 아직 허용하지 않는 것입니다. 수정한 '
            'investing-proxy-worker.js 를 재배포했는지 확인하세요.</div>'
            '</div></div>' % _esc(reason))
        return
    render_13f(guru, data)
    _set_guru_status("완료 · %s" % guru["ko"])


def _make_guru_handler(cik):
    def handler(evt):
        asyncio.ensure_future(show_guru(cik))
    return handler

@when("click", "#lookupBtn")
async def on_lookup(event):
    ticker = document.querySelector("#ticker").value.strip()
    if not ticker:
        window.alert("티커를 입력하세요.")
        return
    exchange = document.querySelector("#exchange").value.strip() or None
    lang = document.querySelector("#lang").value

    _set_busy(True)
    _set_status("조회 중...")
    document.querySelector("#result").innerHTML = ""
    try:
        kind, full_symbol, payload = await lookup(ticker, exchange, lang)
        if kind == "notfound" or full_symbol is None:
            _set_status("실패")
            window.alert("'%s' 에 해당하는 심볼을 찾지 못했습니다." % ticker)
            return
        if kind == "nodata" or payload is None:
            _set_status("실패")
            window.alert("'%s' 의 데이터를 가져오지 못했습니다.\n"
                         "티커 또는 거래소를 확인하세요." % full_symbol)
            return
        if kind == "etf":
            render_holdings(full_symbol, payload["meta"],
                            payload["holdings"], payload["report_ts"])
            _set_status("완료 · %s (ETF)" % full_symbol)
        else:
            render_report(full_symbol, payload)
            _set_status("완료 · %s (종목)" % full_symbol)
    except InvestingApiError as exc:
        _set_status("오류")
        window.alert("조회 실패:\n%s" % exc)
    except Exception as exc:
        _set_status("오류")
        window.alert("조회 중 오류가 발생했습니다:\n%s" % exc)
    finally:
        _set_busy(False)


@when("keydown", "#ticker")
def on_enter(event):
    if event.key == "Enter":
        document.querySelector("#lookupBtn").click()


@when("click", ".tab-btn")
def on_tab(event):
    name = event.target.getAttribute("data-tab")
    if not name:
        return
    btns = document.querySelectorAll(".tab-btn")
    for i in range(btns.length):
        b = btns.item(i)
        if b.getAttribute("data-tab") == name:
            b.classList.add("active")
        else:
            b.classList.remove("active")
    panels = document.querySelectorAll(".tab-panel")
    for i in range(panels.length):
        p = panels.item(i)
        if p.id == ("tab-" + name):
            p.classList.add("active")
        else:
            p.classList.remove("active")


@when("click", "#macroBtn")
async def on_macro(event):
    key = document.querySelector("#fredKey").value.strip()
    if not key:
        window.alert("FRED API 키를 입력하세요.")
        return
    try:
        window.localStorage.setItem("fredApiKey", key)
    except Exception:
        pass
    _macro_busy(True)
    _set_macro_status("조회 중...")
    document.querySelector("#macro-result").innerHTML = ""
    try:
        rows = await fetch_all_macro(key)
        render_macro(rows, _MACRO_MODE.get("mode", "normal"))
        ok = sum(1 for _, r in rows if r and r.get("value") is not None)
        if ok == 0:
            _set_macro_status("실패 · 데이터 없음 (API 키/프록시 확인)")
        else:
            _set_macro_status("완료 · %d/%d 지표" % (ok, len(rows)))
    except InvestingApiError as exc:
        _set_macro_status("오류")
        window.alert("조회 실패:\n%s" % exc)
    except Exception as exc:
        _set_macro_status("오류")
        window.alert("조회 중 오류가 발생했습니다:\n%s" % exc)
    finally:
        _macro_busy(False)

@when("click", ".macro-mode")
def on_macro_mode(event):
    mode = event.target.getAttribute("data-mode")
    if mode not in ("normal", "custom"):
        return
    _MACRO_MODE["mode"] = mode
    btns = document.querySelectorAll(".macro-mode")
    for i in range(btns.length):
        b = btns.item(i)
        if b.getAttribute("data-mode") == mode:
            b.classList.add("active")
        else:
            b.classList.remove("active")
    note = document.querySelector("#cycle-note")
    if note is not None:
        note.style.display = "block" if mode == "custom" else "none"
    rows = _MACRO_LAST.get("rows")
    if rows:
        render_macro(rows, mode)
